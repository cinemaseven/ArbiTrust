<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clean Ledger Escrow - Freelancer View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
      const { useMemo, useState } = React;

      const projectData = {
        id: 1,
        title: "Business Website Redesign",
        client: "Acme Studio",
        freelancer: "Jane Developer",
        budget: 2500,
        earningsReleased: 800,
        earningsPending: 1700,
        progress: 67,
        status: "In Progress",
        description:
          "Redesign the company website with responsive layouts, a modern visual system, and a functional contact form.",
        milestones: [
          {
            id: 1,
            title: "Homepage Design",
            description:
              "Design homepage with hero section, services section, testimonials, and CTA.",
            amount: 800,
            dueDate: "2026-04-05",
            status: "Released",
            checklist: [
              { text: "Hero section", done: true },
              { text: "Services section", done: true },
              { text: "Testimonials section", done: true },
              { text: "Call-to-action button", done: true },
            ],
            aiResult: {
              score: 98,
              matched: [
                "Hero section",
                "Services section",
                "Testimonials section",
                "Call-to-action button",
              ],
              missing: [],
              suggestion: "Milestone is complete. Payment already released.",
            },
          },
          {
            id: 2,
            title: "Responsive Mobile Layout",
            description:
              "Create mobile responsive version of homepage and about page, including tablet responsiveness.",
            amount: 700,
            dueDate: "2026-04-12",
            status: "Submitted",
            checklist: [
              { text: "Mobile homepage layout", done: true },
              { text: "Mobile about page layout", done: true },
              { text: "Tablet responsiveness", done: false },
            ],
            aiResult: {
              score: 80,
              matched: ["Mobile homepage layout", "Mobile about page layout"],
              missing: ["Tablet responsiveness"],
              suggestion: "Add the remaining deliverable before final approval.",
            },
          },
          {
            id: 3,
            title: "Functional Contact Form",
            description:
              "Implement a working contact form with validation and success message.",
            amount: 1000,
            dueDate: "2026-04-20",
            status: "In Progress",
            checklist: [
              { text: "Form fields", done: true },
              { text: "Validation", done: true },
              { text: "Success message", done: false },
            ],
            aiResult: {
              score: 82,
              matched: ["Form fields", "Validation"],
              missing: ["Success message"],
              suggestion: "Complete the success message before submitting.",
            },
          },
        ],
      };

      const statusClasses = {
        Pending: "bg-slate-100 text-slate-700 border-slate-200",
        Funded: "bg-sky-100 text-sky-700 border-sky-200",
        "In Progress": "bg-amber-100 text-amber-700 border-amber-200",
        Submitted: "bg-indigo-100 text-indigo-700 border-indigo-200",
        "Under Review": "bg-violet-100 text-violet-700 border-violet-200",
        Approved: "bg-emerald-100 text-emerald-700 border-emerald-200",
        Disputed: "bg-rose-100 text-rose-700 border-rose-200",
        Released: "bg-green-100 text-green-700 border-green-200",
      };

      function StatusBadge({ status }) {
        return (
          <span className={`inline-flex items-center rounded-full border px-3 py-1 text-xs font-semibold ${
            statusClasses[status] || "bg-slate-100 text-slate-700 border-slate-200"
          }`}>
            {status}
          </span>
        );
      }

      function ProgressBar({ value, label = "Progress" }) {
        return (
          <div className="w-full">
            <div className="mb-2 flex items-center justify-between text-sm">
              <span className="text-slate-500">{label}</span>
              <span className="font-semibold text-slate-900">{value}%</span>
            </div>
            <div className="h-3 w-full rounded-full bg-slate-200">
              <div
                className="h-3 rounded-full bg-gradient-to-r from-indigo-500 to-sky-500 transition-all"
                style={{ width: `${value}%` }}
              />
            </div>
          </div>
        );
      }

      function GlassHeader({ currentView, setCurrentView }) {
        const tabs = ["Dashboard", "Project", "Milestones", "Submit Work", "Disputes", "Profile"];
        return (
          <div className="sticky top-0 z-30 border-b border-white/60 bg-white/80 backdrop-blur-xl">
            <div className="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-4 px-4 py-4">
              <div className="flex items-center gap-3">
                <div className="flex h-10 w-10 items-center justify-center rounded-2xl bg-slate-900 text-sm font-bold text-white shadow-lg shadow-slate-300">
                  CL
                </div>
                <div>
                  <h1 className="text-xl font-bold text-slate-900">Clean Ledger Escrow</h1>
                  <p className="text-sm text-slate-500">Freelancer workspace</p>
                </div>
              </div>

              <div className="flex flex-wrap gap-2">
                {tabs.map((tab) => (
                  <button
                    key={tab}
                    onClick={() => setCurrentView(tab)}
                    className={`rounded-2xl px-4 py-2 text-sm font-medium transition ${
                      currentView === tab
                        ? "bg-slate-900 text-white shadow-lg shadow-slate-300"
                        : "bg-slate-100 text-slate-700 hover:bg-slate-200"
                    }`}
                  >
                    {tab}
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      }

      function HeroCard({ project, submittedCount }) {
        return (
          <div className="overflow-hidden rounded-3xl border border-slate-200 bg-gradient-to-br from-slate-900 via-indigo-900 to-sky-900 p-6 text-white shadow-xl shadow-slate-300">
            <div className="grid gap-6 lg:grid-cols-[1.6fr,1fr]">
              <div>
                <p className="text-sm font-medium text-sky-200">Freelancer overview</p>
                <h2 className="mt-3 text-3xl font-bold tracking-tight">{project.title}</h2>
                <p className="mt-3 max-w-2xl text-sm leading-6 text-slate-200">
                  Track work completion, validate deliverables with AI, and manage submissions milestone by milestone.
                </p>

                <div className="mt-6 grid gap-3 sm:grid-cols-3">
                  <div className="rounded-2xl border border-white/10 bg-white/10 p-4">
                    <p className="text-xs uppercase tracking-wide text-slate-300">Released</p>
                    <p className="mt-2 text-2xl font-bold">${project.earningsReleased}</p>
                  </div>
                  <div className="rounded-2xl border border-white/10 bg-white/10 p-4">
                    <p className="text-xs uppercase tracking-wide text-slate-300">Pending</p>
                    <p className="mt-2 text-2xl font-bold">${project.earningsPending}</p>
                  </div>
                  <div className="rounded-2xl border border-white/10 bg-white/10 p-4">
                    <p className="text-xs uppercase tracking-wide text-slate-300">Submitted</p>
                    <p className="mt-2 text-2xl font-bold">{submittedCount}</p>
                  </div>
                </div>
              </div>

              <div className="rounded-3xl border border-white/10 bg-white/10 p-5 backdrop-blur">
                <div className="flex items-center justify-between">
                  <p className="text-sm font-medium text-slate-200">Project Health</p>
                  <StatusBadge status={project.status} />
                </div>
                <div className="mt-5">
                  <ProgressBar value={project.progress} label="Your completion" />
                </div>
                <div className="mt-6 space-y-3 text-sm text-slate-200">
                  <div className="flex items-center justify-between rounded-2xl bg-white/10 px-4 py-3">
                    <span>Client</span>
                    <span className="font-semibold text-white">{project.client}</span>
                  </div>
                  <div className="flex items-center justify-between rounded-2xl bg-white/10 px-4 py-3">
                    <span>Total contract</span>
                    <span className="font-semibold text-white">${project.budget}</span>
                  </div>
                  <div className="flex items-center justify-between rounded-2xl bg-white/10 px-4 py-3">
                    <span>Remaining milestones</span>
                    <span className="font-semibold text-white">{project.milestones.filter((m) => m.status !== "Released").length}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      function StatsCard({ title, value, subtitle, accent }) {
        const accents = {
          indigo: "from-indigo-500/10 to-sky-500/10 border-indigo-100",
          emerald: "from-emerald-500/10 to-green-500/10 border-emerald-100",
          amber: "from-amber-500/10 to-orange-500/10 border-amber-100",
          rose: "from-rose-500/10 to-pink-500/10 border-rose-100",
        };
        return (
          <div className={`rounded-3xl border bg-gradient-to-br ${accents[accent] || accents.indigo} p-5 shadow-sm`}>
            <p className="text-sm text-slate-500">{title}</p>
            <h3 className="mt-2 text-2xl font-bold text-slate-900">{value}</h3>
            <p className="mt-1 text-sm text-slate-500">{subtitle}</p>
          </div>
        );
      }

      function MilestoneCompactCard({ milestone, onOpen }) {
        const done = milestone.checklist.filter((i) => i.done).length;
        return (
          <div className="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md">
            <div className="flex items-start justify-between gap-3">
              <div>
                <h3 className="text-lg font-semibold text-slate-900">{milestone.title}</h3>
                <p className="mt-1 text-sm text-slate-500">{milestone.description}</p>
              </div>
              <StatusBadge status={milestone.status} />
            </div>

            <div className="mt-5 grid grid-cols-2 gap-3 text-sm">
              <div className="rounded-2xl bg-slate-50 p-3">
                <p className="text-slate-500">Amount</p>
                <p className="font-semibold text-slate-900">${milestone.amount}</p>
              </div>
              <div className="rounded-2xl bg-slate-50 p-3">
                <p className="text-slate-500">Due Date</p>
                <p className="font-semibold text-slate-900">{milestone.dueDate}</p>
              </div>
            </div>

            <div className="mt-4">
              <ProgressBar value={Math.round((done / milestone.checklist.length) * 100)} label="Checklist completion" />
            </div>

            <button
              onClick={onOpen}
              className="mt-5 w-full rounded-2xl bg-slate-900 px-4 py-3 text-sm font-medium text-white transition hover:bg-slate-800"
            >
              Open Milestone
            </button>
          </div>
        );
      }

      function AIResultBox({ result, title = "AI Evaluation Result" }) {
        return (
          <div className="rounded-3xl border border-indigo-200 bg-gradient-to-br from-indigo-50 to-sky-50 p-6 shadow-sm">
            <div className="flex flex-wrap items-center justify-between gap-3">
              <div>
                <h3 className="text-xl font-bold text-slate-900">{title}</h3>
                <p className="mt-1 text-sm text-slate-500">Preview how the platform checks your submission against milestone requirements.</p>
              </div>
              <span className="rounded-full border border-indigo-200 bg-white px-4 py-2 text-sm font-bold text-indigo-700 shadow-sm">
                Match Score: {result.score}%
              </span>
            </div>

            <div className="mt-5 grid gap-4 md:grid-cols-2">
              <div className="rounded-2xl border border-emerald-100 bg-white p-4">
                <h4 className="font-semibold text-emerald-700">Matched Items</h4>
                <ul className="mt-3 list-disc space-y-1 pl-5 text-sm text-slate-700">
                  {result.matched.length ? result.matched.map((item, i) => <li key={i}>{item}</li>) : <li>No matched items yet</li>}
                </ul>
              </div>
              <div className="rounded-2xl border border-rose-100 bg-white p-4">
                <h4 className="font-semibold text-rose-700">Missing Items</h4>
                <ul className="mt-3 list-disc space-y-1 pl-5 text-sm text-slate-700">
                  {result.missing.length ? result.missing.map((item, i) => <li key={i}>{item}</li>) : <li>No missing items</li>}
                </ul>
              </div>
            </div>

            <div className="mt-4 rounded-2xl border border-slate-200 bg-white p-4">
              <h4 className="font-semibold text-slate-900">Suggested Action</h4>
              <p className="mt-2 text-sm text-slate-700">{result.suggestion}</p>
            </div>
          </div>
        );
      }

      function DashboardView({ project, setCurrentView, openMilestone }) {
        const submittedCount = project.milestones.filter((m) => m.status === "Submitted").length;
        return (
          <div className="space-y-6">
            <HeroCard project={project} submittedCount={submittedCount} />

            <div className="grid gap-4 md:grid-cols-4">
              <StatsCard title="Active Contracts" value="1" subtitle="Current project" accent="indigo" />
              <StatsCard title="Released Earnings" value={`$${project.earningsReleased}`} subtitle="Already paid out" accent="emerald" />
              <StatsCard title="Awaiting Review" value={submittedCount} subtitle="Submitted milestones" accent="amber" />
              <StatsCard title="Potential Earnings" value={`$${project.budget}`} subtitle="Total contract value" accent="rose" />
            </div>

            <div className="grid gap-6 lg:grid-cols-[1.45fr,1fr]">
              <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <div className="mb-5 flex items-center justify-between">
                  <div>
                    <h2 className="text-xl font-bold text-slate-900">Work Overview</h2>
                    <p className="text-sm text-slate-500">Track tasks, checklist progress, and approval readiness.</p>
                  </div>
                  <button
                    onClick={() => setCurrentView("Project")}
                    className="rounded-2xl bg-slate-100 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-200"
                  >
                    Open Project
                  </button>
                </div>

                <div className="rounded-3xl border border-slate-200 bg-slate-50 p-5">
                  <div className="flex flex-col gap-3 md:flex-row md:items-start md:justify-between">
                    <div>
                      <h3 className="text-2xl font-bold text-slate-900">{project.title}</h3>
                      <p className="mt-2 max-w-2xl text-sm text-slate-600">{project.description}</p>
                      <p className="mt-3 text-sm text-slate-500">
                        Client: {project.client} • Freelancer: {project.freelancer}
                      </p>
                    </div>
                    <StatusBadge status={project.status} />
                  </div>

                  <div className="mt-5">
                    <ProgressBar value={project.progress} label="Completion" />
                  </div>
                </div>
              </div>

              <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <h2 className="text-xl font-bold text-slate-900">Your Queue</h2>
                <p className="mt-1 text-sm text-slate-500">Milestones to continue, submit, or refine.</p>
                <div className="mt-5 space-y-4">
                  {project.milestones.map((m) => (
                    <div key={m.id} className="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                      <div className="flex items-center justify-between gap-3">
                        <div>
                          <p className="font-semibold text-slate-900">{m.title}</p>
                          <p className="text-sm text-slate-500">${m.amount}</p>
                        </div>
                        <StatusBadge status={m.status} />
                      </div>
                      <button
                        onClick={() => openMilestone(m.id)}
                        className="mt-3 w-full rounded-2xl bg-white px-4 py-2 text-sm font-medium text-slate-700 shadow-sm hover:bg-slate-100"
                      >
                        Open Milestone
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        );
      }

      function ProjectView({ project, openMilestone }) {
        return (
          <div className="space-y-6">
            <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <div className="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
                <div>
                  <p className="text-sm font-medium text-indigo-600">Project details</p>
                  <h2 className="mt-2 text-3xl font-bold text-slate-900">{project.title}</h2>
                  <p className="mt-3 max-w-3xl text-sm leading-6 text-slate-600">{project.description}</p>
                  <p className="mt-3 text-sm text-slate-500">
                    Client: {project.client} • Freelancer: {project.freelancer}
                  </p>
                </div>
                <StatusBadge status={project.status} />
              </div>

              <div className="mt-6 grid gap-4 md:grid-cols-4">
                <div className="rounded-2xl bg-slate-50 p-4">
                  <p className="text-sm text-slate-500">Contract Value</p>
                  <p className="text-xl font-bold text-slate-900">${project.budget}</p>
                </div>
                <div className="rounded-2xl bg-slate-50 p-4">
                  <p className="text-sm text-slate-500">Released</p>
                  <p className="text-xl font-bold text-slate-900">${project.earningsReleased}</p>
                </div>
                <div className="rounded-2xl bg-slate-50 p-4">
                  <p className="text-sm text-slate-500">Pending</p>
                  <p className="text-xl font-bold text-slate-900">${project.earningsPending}</p>
                </div>
                <div className="rounded-2xl bg-slate-50 p-4">
                  <p className="text-sm text-slate-500">Milestones</p>
                  <p className="text-xl font-bold text-slate-900">{project.milestones.length}</p>
                </div>
              </div>

              <div className="mt-6">
                <ProgressBar value={project.progress} label="Overall progress" />
              </div>
            </div>

            <div>
              <h3 className="mb-4 text-xl font-bold text-slate-900">Milestone Timeline</h3>
              <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
                {project.milestones.map((m) => (
                  <MilestoneCompactCard key={m.id} milestone={m} onOpen={() => openMilestone(m.id)} />
                ))}
              </div>
            </div>
          </div>
        );
      }

      function MilestonesView({ project, openMilestone }) {
        return (
          <div className="space-y-6">
            <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <h2 className="text-2xl font-bold text-slate-900">Milestone Workspace</h2>
              <p className="mt-2 text-sm text-slate-500">
                Review requirements, check completion, and decide which milestone to submit next.
              </p>
            </div>

            <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
              {project.milestones.map((m) => (
                <MilestoneCompactCard key={m.id} milestone={m} onOpen={() => openMilestone(m.id)} />
              ))}
            </div>
          </div>
        );
      }

      function MilestoneDrawer({ milestone, onClose, setCurrentView }) {
        if (!milestone) return null;
        const completion = Math.round(
          (milestone.checklist.filter((item) => item.done).length / milestone.checklist.length) * 100
        );

        return (
          <div className="fixed inset-0 z-40 flex justify-end bg-slate-900/40 p-3 backdrop-blur-sm">
            <div className="h-full w-full max-w-2xl overflow-y-auto rounded-3xl border border-slate-200 bg-white p-6 shadow-2xl">
              <div className="flex items-start justify-between gap-4">
                <div>
                  <p className="text-sm font-medium text-indigo-600">Milestone workspace</p>
                  <h2 className="mt-2 text-2xl font-bold text-slate-900">{milestone.title}</h2>
                  <p className="mt-2 text-sm leading-6 text-slate-600">{milestone.description}</p>
                </div>
                <button
                  onClick={onClose}
                  className="rounded-2xl bg-slate-100 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-200"
                >
                  Close
                </button>
              </div>

              <div className="mt-6 grid gap-4 md:grid-cols-3">
                <div className="rounded-2xl bg-slate-50 p-4">
                  <p className="text-sm text-slate-500">Amount</p>
                  <p className="text-lg font-bold text-slate-900">${milestone.amount}</p>
                </div>
                <div className="rounded-2xl bg-slate-50 p-4">
                  <p className="text-sm text-slate-500">Due Date</p>
                  <p className="text-lg font-bold text-slate-900">{milestone.dueDate}</p>
                </div>
                <div className="rounded-2xl bg-slate-50 p-4">
                  <p className="text-sm text-slate-500">Status</p>
                  <div className="mt-2"><StatusBadge status={milestone.status} /></div>
                </div>
              </div>

              <div className="mt-6">
                <ProgressBar value={completion} label="Checklist completion" />
              </div>

              <div className="mt-6 rounded-3xl border border-slate-200 bg-slate-50 p-5">
                <h3 className="text-lg font-semibold text-slate-900">Requirement Checklist</h3>
                <div className="mt-4 space-y-3">
                  {milestone.checklist.map((item, i) => (
                    <div key={i} className="flex items-center gap-3 rounded-2xl border border-slate-200 bg-white p-4">
                      <div className={`h-3 w-3 rounded-full ${item.done ? "bg-emerald-500" : "bg-slate-300"}`} />
                      <span className={`text-sm ${item.done ? "text-slate-500" : "text-slate-700"}`}>{item.text}</span>
                    </div>
                  ))}
                </div>
              </div>

              <div className="mt-6">
                <AIResultBox result={milestone.aiResult} title="AI Requirement Match Preview" />
              </div>

              <div className="mt-6 flex flex-wrap gap-3">
                <button
                  onClick={() => {
                    onClose();
                    setCurrentView("Submit Work");
                  }}
                  className="rounded-2xl bg-indigo-600 px-5 py-3 text-sm font-medium text-white hover:bg-indigo-700"
                >
                  Submit Deliverable
                </button>
                <button
                  onClick={() => {
                    onClose();
                    setCurrentView("Disputes");
                  }}
                  className="rounded-2xl bg-rose-600 px-5 py-3 text-sm font-medium text-white hover:bg-rose-700"
                >
                  Raise Dispute
                </button>
              </div>
            </div>
          </div>
        );
      }

      function SubmitWorkView({ milestone }) {
        const [notes, setNotes] = useState("I completed the form fields and validation. I still need to finalize the success message.");
        const [showResult, setShowResult] = useState(false);

        const mockResult = milestone ? milestone.aiResult : {
          score: 82,
          matched: ["Form fields", "Validation"],
          missing: ["Success message"],
          suggestion: "Complete the missing deliverable before final submission.",
        };

        return (
          <div className="grid gap-6 lg:grid-cols-[1.05fr,1fr]">
            <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <p className="text-sm font-medium text-indigo-600">Submission center</p>
              <h2 className="mt-2 text-2xl font-bold text-slate-900">Submit Deliverable</h2>
              <p className="mt-2 text-sm leading-6 text-slate-600">
                Upload milestone evidence, add notes, and preview how the AI checker evaluates your submission.
              </p>

              <div className="mt-6 rounded-3xl border-2 border-dashed border-slate-300 bg-slate-50 p-8 text-center">
                <p className="text-lg font-semibold text-slate-800">Upload Files</p>
                <p className="mt-2 text-sm text-slate-500">Drag and drop area for mock demo only</p>
                <button className="mt-4 rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800">
                  Choose Files
                </button>
              </div>

              <div className="mt-6 rounded-3xl border border-slate-200 bg-slate-50 p-4">
                <p className="font-semibold text-slate-900">Current Milestone</p>
                <p className="mt-1 text-sm text-slate-600">{milestone ? milestone.title : "Functional Contact Form"}</p>
              </div>

              <div className="mt-6">
                <label className="mb-2 block text-sm font-medium text-slate-700">Submission Notes</label>
                <textarea
                  value={notes}
                  onChange={(e) => setNotes(e.target.value)}
                  rows="7"
                  className="w-full rounded-3xl border border-slate-300 p-4 outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100"
                  placeholder="Describe what you uploaded..."
                />
              </div>

              <button
                onClick={() => setShowResult(true)}
                className="mt-6 w-full rounded-2xl bg-indigo-600 px-4 py-3 font-medium text-white hover:bg-indigo-700"
              >
                Run AI Check
              </button>
            </div>

            <div>
              {showResult ? (
                <AIResultBox result={mockResult} title="AI Submission Check" />
              ) : (
                <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                  <h3 className="text-xl font-bold text-slate-900">AI Check Result</h3>
                  <p className="mt-2 text-sm text-slate-500">
                    Click “Run AI Check” to generate the requirement matching result and suggestion.
                  </p>
                </div>
              )}
            </div>
          </div>
        );
      }

      function DisputesView() {
        const [complaint, setComplaint] = useState("");
        const [analyzed, setAnalyzed] = useState(false);

        return (
          <div className="grid gap-6 lg:grid-cols-[1.1fr,1fr]">
            <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <p className="text-sm font-medium text-rose-600">Dispute support</p>
              <h2 className="mt-2 text-2xl font-bold text-slate-900">Freelancer Complaint Intake</h2>
              <p className="mt-2 text-sm leading-6 text-slate-600">
                Explain your side if a milestone is not approved even though you believe the required work was substantially delivered.
              </p>

              <div className="mt-6">
                <label className="mb-2 block text-sm font-medium text-slate-700">Complaint</label>
                <textarea
                  value={complaint}
                  onChange={(e) => setComplaint(e.target.value)}
                  rows="8"
                  placeholder="Example: I submitted the required files and most checklist items are complete. The client delayed approval despite the work being substantially done."
                  className="w-full rounded-3xl border border-slate-300 p-4 outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100"
                />
              </div>

              <div className="mt-5 rounded-3xl border border-slate-200 bg-slate-50 p-4">
                <p className="font-semibold text-slate-900">Evidence Attachments</p>
                <p className="mt-1 text-sm text-slate-500">
                  Submission screenshots, design files, and milestone artifacts would appear here in the full product.
                </p>
              </div>

              <button
                onClick={() => setAnalyzed(true)}
                className="mt-6 w-full rounded-2xl bg-rose-600 px-4 py-3 font-medium text-white hover:bg-rose-700"
              >
                Analyze Dispute
              </button>
            </div>

            <div className="space-y-6">
              {analyzed ? (
                <>
                  <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                    <h3 className="text-xl font-bold text-slate-900">AI Summary</h3>
                    <p className="mt-3 text-sm leading-6 text-slate-700">
                      The freelancer states that the submission covers most required items and that approval has been delayed even though the majority of the milestone work appears complete.
                    </p>
                  </div>

                  <div className="rounded-3xl border border-amber-200 bg-gradient-to-br from-amber-50 to-orange-50 p-6 shadow-sm">
                    <div className="flex items-center justify-between gap-3">
                      <h3 className="text-xl font-bold text-slate-900">Suggested Decision</h3>
                      <span className="rounded-full border border-amber-200 bg-white px-3 py-1 text-sm font-semibold text-amber-700">
                        Confidence: Medium
                      </span>
                    </div>
                    <p className="mt-3 text-sm leading-6 text-slate-700">
                      Recheck the checklist evidence and consider partial release if the missing item is minor relative to the completed deliverables.
                    </p>
                  </div>
                </>
              ) : (
                <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                  <h3 className="text-xl font-bold text-slate-900">AI Dispute Output</h3>
                  <p className="mt-2 text-sm text-slate-500">
                    Enter a complaint and click analyze to generate the AI summary and recommendation.
                  </p>
                </div>
              )}
            </div>
          </div>
        );
      }

      function ProfileView() {
        return (
          <div className="space-y-6">
            <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <div className="flex flex-col gap-4 md:flex-row md:items-center">
                <div className="flex h-20 w-20 items-center justify-center rounded-3xl bg-gradient-to-br from-slate-900 to-indigo-700 text-2xl font-bold text-white shadow-lg shadow-slate-300">
                  JD
                </div>
                <div>
                  <p className="text-sm font-medium text-indigo-600">Freelancer profile</p>
                  <h2 className="mt-1 text-2xl font-bold text-slate-900">Jane Developer</h2>
                  <p className="text-slate-500">Frontend developer • Contracted contributor</p>
                </div>
              </div>
            </div>

            <div className="grid gap-4 md:grid-cols-4">
              <StatsCard title="Projects Completed" value="18" subtitle="Recent delivery record" accent="indigo" />
              <StatsCard title="Approval Rate" value="94%" subtitle="High client acceptance" accent="emerald" />
              <StatsCard title="Dispute Rate" value="6%" subtitle="Low issue frequency" accent="rose" />
              <StatsCard title="Trust Score" value="92/100" subtitle="Reliable freelancer profile" accent="amber" />
            </div>

            <div className="grid gap-6 lg:grid-cols-2">
              <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <h3 className="text-xl font-bold text-slate-900">Performance Indicators</h3>
                <div className="mt-5 space-y-5">
                  <div>
                    <p className="mb-2 text-sm font-medium text-slate-700">Delivery Quality</p>
                    <ProgressBar value={91} />
                  </div>
                  <div>
                    <p className="mb-2 text-sm font-medium text-slate-700">On-Time Completion</p>
                    <ProgressBar value={87} />
                  </div>
                  <div>
                    <p className="mb-2 text-sm font-medium text-slate-700">Client Satisfaction</p>
                    <ProgressBar value={94} />
                  </div>
                </div>
              </div>

              <div className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <h3 className="text-xl font-bold text-slate-900">Recent Reviews</h3>
                <div className="mt-4 space-y-4">
                  <div className="rounded-2xl bg-slate-50 p-4">
                    <p className="font-semibold text-slate-900">Acme Studio</p>
                    <p className="mt-1 text-sm text-slate-600">“Great communication and strong design quality.”</p>
                  </div>
                  <div className="rounded-2xl bg-slate-50 p-4">
                    <p className="font-semibold text-slate-900">Northwind Labs</p>
                    <p className="mt-1 text-sm text-slate-600">“Delivered most items on time and handled revisions well.”</p>
                  </div>
                  <div className="rounded-2xl bg-slate-50 p-4">
                    <p className="font-semibold text-slate-900">Pixel Forge</p>
                    <p className="mt-1 text-sm text-slate-600">“Very professional. Easy to work with.”</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      function App() {
        const [currentView, setCurrentView] = useState("Dashboard");
        const [selectedMilestoneId, setSelectedMilestoneId] = useState(3);
        const [drawerOpen, setDrawerOpen] = useState(false);

        const selectedMilestone = useMemo(
          () => projectData.milestones.find((m) => m.id === selectedMilestoneId),
          [selectedMilestoneId]
        );

        const openMilestone = (id) => {
          setSelectedMilestoneId(id);
          setDrawerOpen(true);
        };

        return (
          <div className="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(99,102,241,0.14),_transparent_28%),linear-gradient(to_bottom,_#f8fafc,_#eef2ff_45%,_#f8fafc)]">
            <GlassHeader currentView={currentView} setCurrentView={setCurrentView} />

            <main className="mx-auto max-w-7xl px-4 py-8">
              {currentView === "Dashboard" && (
                <DashboardView project={projectData} setCurrentView={setCurrentView} openMilestone={openMilestone} />
              )}
              {currentView === "Project" && (
                <ProjectView project={projectData} openMilestone={openMilestone} />
              )}
              {currentView === "Milestones" && (
                <MilestonesView project={projectData} openMilestone={openMilestone} />
              )}
              {currentView === "Submit Work" && (
                <SubmitWorkView milestone={selectedMilestone} />
              )}
              {currentView === "Disputes" && <DisputesView />}
              {currentView === "Profile" && <ProfileView />}
            </main>

            {drawerOpen && (
              <MilestoneDrawer
                milestone={selectedMilestone}
                onClose={() => setDrawerOpen(false)}
                setCurrentView={setCurrentView}
              />
            )}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
